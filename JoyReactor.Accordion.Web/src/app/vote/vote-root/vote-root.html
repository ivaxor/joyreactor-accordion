<div class="card">
  <div class="card-body p-3">
    @if (!started()) {
    <div class="alert alert-danger text-center" role="alert">
      <span i18n>В ленте будут картинки как из <b>SFW</b>, так и из <b>NSFW</b> постов. Будьте осторожны!</span>
    </div>

    <div class="alert alert-primary text-center" role="alert">
      <span i18n>Если картинка более высокого качества или анимирована, то она не является баяном.</span>
    </div>

    <div class="alert alert-info text-center" role="alert">
      <span i18n>Прогресс сохраняется на только на этом устройстве (в LocalStorage).</span>
    </div>

    <div class="d-grid gap-2">
      <button i18n class="btn btn-primary" type="button" (click)="start()">Начать</button>
    </div>
    } @else {
    <app-vote-compare></app-vote-compare>
    }
  </div>
</div>
